server:
  port: ${PORT:9999}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: producto-service
              uri: ${PRODUCTO_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/productos/**

            - id: inventario-service
              uri: ${INVENTARIO_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/inventario/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
